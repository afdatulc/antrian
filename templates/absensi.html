<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran & Presensi Wawancara</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/absensi.css') }}">
</head>

<body>

    <div class="form-container">
        <div class="form-card">
            <div class="form-header">
                <span class="icon"></span>
                <h1>Pendaftaran Wawancara</h1>
                <p>Isi data diri untuk mendapatkan nomor antrian</p>
            </div>

            <div class="info-note">
                <span class="note-icon"></span>
                <p>Setelah mendaftar, Anda akan mendapatkan <strong style="color: #fbbf24;">nomor antrian</strong>.
                    Silakan menunggu di ruangan hingga nomor Anda dipanggil oleh pewawancara.</p>
            </div>

            <form method="POST" action="/submit_absensi" id="absensi-form">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <div class="input-wrapper">
                        <span class="input-icon"></span>
                        <input type="text" name="nama" placeholder="Nama Lengkap" required autocomplete="name">
                    </div>
                </div>

                <div class="form-group">
                    <label>No. Telepon</label>
                    <div class="input-wrapper">
                        <span class="input-icon"></span>
                        <input type="tel" name="telepon" placeholder="08123456789" required autocomplete="tel">
                    </div>
                </div>

                <div class="form-group">
                    <label>ID Sobat</label>
                    <div class="input-wrapper">
                        <span class="input-icon"></span>
                        <input type="text" name="id_sobat" pattern="[0-9]+" inputmode="numeric" placeholder="35781234"
                            autocomplete="off">
                    </div>
                </div>

                <button type="submit" class="submit-btn">Ambil Nomor Antrian</button>
            </form>

            <a href="/display" class="back-link">← Kembali ke layar antrian</a>
        </div>
    </div>

</body>

</html>
