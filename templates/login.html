<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Sistem Antrian Wawancara</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="icon"></span>
                <h1>Login Sistem</h1>
                <p>Masuk sebagai Admin atau Pewawancara</p>
            </div>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="post">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon"></span>
                        <input name="username" placeholder="Masukkan username" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon"></span>
                        <input name="password" type="password" placeholder="Masukkan password" required
                            autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="submit-btn">Masuk</button>
            </form>

            <a href="/display" class="back-link">← Kembali ke layar antrian</a>
        </div>
    </div>

</body>

</html>
