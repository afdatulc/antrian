<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Statistik Wawancara</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 20px;
        }
        h1 {
            color: #0d47a1;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }
        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card h2 {
            margin-bottom: 10px;
            color: #1565c0;
        }
    </style>
</head>
<body>

<h1>Statistik Per Pewawancara</h1>

<p><b>Total Antrian Menunggu:</b> {{ menunggu }}</p>

<div class="grid">
    {% for loket, data in statistik.items() %}
    <div class="card">
        <h2>Loket {{ loket }}</h2>
        <p>Total Dilayani: {{ data.total }}</p>
        <p>Selesai: {{ data.selesai }}</p>
        <p>Sedang Dipanggil: {{ data.dipanggil }}</p>
    </div>
    {% endfor %}
</div>

<br>
<a href="/admin">⬅ Kembali ke Admin</a>

</body>
</html>
