<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pewawancara - Loket {{ loket }}</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pewawancara.css') }}">
</head>

<body>

    <!-- Top Bar -->
    <div class="topbar">
        <div class="topbar-left">
            <h1>🎤 Panel Pewawancara</h1>
            <p>{{ nama_display }}</p>
        </div>
        <div class="topbar-right">
            <span class="badge">Loket {{ loket }}</span>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </div>

    <!-- Main Grid -->
    <div class="main-grid">
        <!-- Current Queue -->
        <div class="current-card">
            <div class="current-label">Sedang Dilayani</div>
            <div class="current-number empty" id="current-number">-</div>
            <div class="current-nama" id="current-nama">Belum ada antrian dipanggil</div>

            <div class="action-buttons">
                <button class="action-btn btn-panggil" id="btn-panggil" onclick="panggilBerikutnya()">
                    📢 Panggil Berikutnya
                </button>
                <button class="action-btn btn-selesai" id="btn-selesai" onclick="selesaiWawancara()"
                    style="display:none;">
                    ✅ Selesai
                </button>
                <button class="action-btn btn-ulang" id="btn-ulang" onclick="panggilUlang()" style="display:none;">
                    🔄 Panggil Ulang
                </button>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar-panel">
            <div class="stats-row">
                <div class="stat-card stat-menunggu">
                    <div class="stat-value" id="stat-menunggu">0</div>
                    <div class="stat-label">Menunggu</div>
                </div>
                <div class="stat-card stat-selesai">
                    <div class="stat-value" id="stat-selesai">0</div>
                    <div class="stat-label">Selesai</div>
                </div>
            </div>

            <div class="history-panel">
                <h3>📋 Riwayat Loket {{ loket }}</h3>
                <div id="history-list">
                    <div class="history-empty">Belum ada riwayat</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const loket = {{ loket }};
        let isLoading = false;

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateUI(data) {
            // Current
            const numEl = document.getElementById('current-number');
            const namaEl = document.getElementById('current-nama');
            const btnSelesai = document.getElementById('btn-selesai');
            const btnUlang = document.getElementById('btn-ulang');
            const btnPanggil = document.getElementById('btn-panggil');

            if (data.current) {
                numEl.textContent = data.current.no_antrian;
                numEl.classList.remove('empty');
                namaEl.textContent = data.current.nama;
                btnSelesai.style.display = 'flex';
                btnUlang.style.display = 'flex';
            } else {
                numEl.textContent = '-';
                numEl.classList.add('empty');
                namaEl.textContent = 'Belum ada antrian dipanggil';
                btnSelesai.style.display = 'none';
                btnUlang.style.display = 'none';
            }

            // Stats
            document.getElementById('stat-menunggu').textContent = data.menunggu;
            document.getElementById('stat-selesai').textContent = data.selesai;

            // History
            const historyEl = document.getElementById('history-list');
            if (data.history && data.history.length > 0) {
                historyEl.innerHTML = data.history.map(item => {
                    let statusClass = '';
                    if (item.status === 'Selesai') statusClass = 'status-selesai';
                    else if (item.status === 'Dipanggil') statusClass = 'status-dipanggil';
                    else if (item.status === 'Dilewati') statusClass = 'status-dilewati';

                    return `
                    <div class="history-item">
                        <span class="h-no">${item.no_antrian}</span>
                        <span class="h-nama">${item.nama}</span>
                        <span class="h-status ${statusClass}">${item.status}</span>
                    </div>
                `;
                }).join('');
            } else {
                historyEl.innerHTML = '<div class="history-empty">Belum ada riwayat</div>';
            }
        }

        async function loadData() {
            try {
                const res = await fetch('/api/interviewer-data');
                const data = await res.json();
                updateUI(data);
            } catch (err) {
                console.error(err);
            }
        }

        async function panggilBerikutnya() {
            if (isLoading) return;
            isLoading = true;
            const btn = document.getElementById('btn-panggil');
            btn.innerHTML = '<span class="spinner"></span> Memanggil...';
            btn.disabled = true;

            try {
                const res = await fetch('/panggil-berikutnya', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast(`✅ Memanggil nomor antrian ${data.no_antrian} - ${data.nama}`);
                    loadData();
                } else {
                    showToast(data.message || 'Tidak ada antrian', true);
                }
            } catch (err) {
                showToast('Gagal memanggil antrian', true);
            }

            btn.innerHTML = '📢 Panggil Berikutnya';
            btn.disabled = false;
            isLoading = false;
        }

        async function selesaiWawancara() {
            if (isLoading) return;
            isLoading = true;

            try {
                const res = await fetch('/selesai-wawancara', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast('✅ Wawancara selesai!');
                    loadData();
                }
            } catch (err) {
                showToast('Gagal mengupdate status', true);
            }

            isLoading = false;
        }

        async function panggilUlang() {
            try {
                const res = await fetch('/panggil-ulang', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast(`🔄 Memanggil ulang nomor ${data.no_antrian} - ${data.nama}`);
                } else {
                    showToast(data.message || 'Gagal panggil ulang', true);
                }
            } catch (err) {
                showToast('Gagal panggil ulang', true);
            }
        }

        // Auto-refresh every 3 seconds
        setInterval(loadData, 3000);
        loadData();
    </script>

</body>

</html>
