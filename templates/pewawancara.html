<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pewawancara - Loket {{ loket }}</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0d1b3e 100%);
            color: #ffffff;
            padding: 25px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .topbar-left h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .topbar-left p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            margin-top: 3px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .badge {
            background: rgba(96, 165, 250, 0.15);
            border: 1px solid rgba(96, 165, 250, 0.3);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #60a5fa;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 18px;
            border-radius: 12px;
            color: #f87171;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        /* Main Layout */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 25px;
        }

        /* Current Queue Card */
        .current-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 50px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .current-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #34d399);
        }

        .current-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
            margin-bottom: 15px;
        }

        .current-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            color: #60a5fa;
            text-shadow: 0 0 60px rgba(96, 165, 250, 0.2);
            transition: all 0.5s ease;
            margin-bottom: 10px;
        }

        .current-number.empty {
            font-size: 5rem;
            color: rgba(255, 255, 255, 0.1);
        }

        .current-nama {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            min-height: 30px;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 18px 35px;
            border: none;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-panggil {
            background: linear-gradient(135deg, #10b981, #34d399);
            color: white;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-panggil:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.4);
        }

        .btn-panggil:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-selesai {
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            color: white;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-selesai:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.4);
        }

        .btn-ulang {
            background: rgba(251, 191, 36, 0.15);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: #fbbf24;
            box-shadow: none;
        }

        .btn-ulang:hover {
            background: rgba(251, 191, 36, 0.25);
            transform: translateY(-2px);
        }

        .btn-panggil:active,
        .btn-selesai:active,
        .btn-ulang:active {
            transform: translateY(0);
        }

        /* Sidebar */
        .sidebar-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.2rem;
            font-weight: 800;
        }

        .stat-card .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 3px;
        }

        .stat-menunggu .stat-value {
            color: #fbbf24;
        }

        .stat-selesai .stat-value {
            color: #34d399;
        }

        /* History */
        .history-panel {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            min-height: 0;
            overflow-y: auto;
        }

        .history-panel h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 15px;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history-item .h-no {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
            color: #60a5fa;
            min-width: 40px;
        }

        .history-item .h-nama {
            flex: 1;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-left: 12px;
        }

        .history-item .h-status {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-selesai {
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
        }

        .status-dipanggil {
            background: rgba(96, 165, 250, 0.15);
            color: #60a5fa;
        }

        .status-dilewati {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .history-empty {
            text-align: center;
            padding: 30px 0;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.85rem;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 185, 129, 0.95);
            backdrop-filter: blur(10px);
            padding: 14px 30px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 100;
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .toast.show {
            bottom: 30px;
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.95);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .current-number {
                font-size: 6rem;
            }
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- Top Bar -->
    <div class="topbar">
        <div class="topbar-left">
            <h1>🎤 Panel Pewawancara</h1>
            <p>{{ nama_display }}</p>
        </div>
        <div class="topbar-right">
            <span class="badge">Loket {{ loket }}</span>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </div>

    <!-- Main Grid -->
    <div class="main-grid">
        <!-- Current Queue -->
        <div class="current-card">
            <div class="current-label">Sedang Dilayani</div>
            <div class="current-number empty" id="current-number">-</div>
            <div class="current-nama" id="current-nama">Belum ada antrian dipanggil</div>

            <div class="action-buttons">
                <button class="action-btn btn-panggil" id="btn-panggil" onclick="panggilBerikutnya()">
                    📢 Panggil Berikutnya
                </button>
                <button class="action-btn btn-selesai" id="btn-selesai" onclick="selesaiWawancara()"
                    style="display:none;">
                    ✅ Selesai
                </button>
                <button class="action-btn btn-ulang" id="btn-ulang" onclick="panggilUlang()" style="display:none;">
                    🔄 Panggil Ulang
                </button>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar-panel">
            <div class="stats-row">
                <div class="stat-card stat-menunggu">
                    <div class="stat-value" id="stat-menunggu">0</div>
                    <div class="stat-label">Menunggu</div>
                </div>
                <div class="stat-card stat-selesai">
                    <div class="stat-value" id="stat-selesai">0</div>
                    <div class="stat-label">Selesai</div>
                </div>
            </div>

            <div class="history-panel">
                <h3>📋 Riwayat Loket {{ loket }}</h3>
                <div id="history-list">
                    <div class="history-empty">Belum ada riwayat</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const loket = {{ loket }};
        let isLoading = false;

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateUI(data) {
            // Current
            const numEl = document.getElementById('current-number');
            const namaEl = document.getElementById('current-nama');
            const btnSelesai = document.getElementById('btn-selesai');
            const btnUlang = document.getElementById('btn-ulang');
            const btnPanggil = document.getElementById('btn-panggil');

            if (data.current) {
                numEl.textContent = data.current.no_antrian;
                numEl.classList.remove('empty');
                namaEl.textContent = data.current.nama;
                btnSelesai.style.display = 'flex';
                btnUlang.style.display = 'flex';
            } else {
                numEl.textContent = '-';
                numEl.classList.add('empty');
                namaEl.textContent = 'Belum ada antrian dipanggil';
                btnSelesai.style.display = 'none';
                btnUlang.style.display = 'none';
            }

            // Stats
            document.getElementById('stat-menunggu').textContent = data.menunggu;
            document.getElementById('stat-selesai').textContent = data.selesai;

            // History
            const historyEl = document.getElementById('history-list');
            if (data.history && data.history.length > 0) {
                historyEl.innerHTML = data.history.map(item => {
                    let statusClass = '';
                    if (item.status === 'Selesai') statusClass = 'status-selesai';
                    else if (item.status === 'Dipanggil') statusClass = 'status-dipanggil';
                    else if (item.status === 'Dilewati') statusClass = 'status-dilewati';

                    return `
                    <div class="history-item">
                        <span class="h-no">${item.no_antrian}</span>
                        <span class="h-nama">${item.nama}</span>
                        <span class="h-status ${statusClass}">${item.status}</span>
                    </div>
                `;
                }).join('');
            } else {
                historyEl.innerHTML = '<div class="history-empty">Belum ada riwayat</div>';
            }
        }

        async function loadData() {
            try {
                const res = await fetch('/api/interviewer-data');
                const data = await res.json();
                updateUI(data);
            } catch (err) {
                console.error(err);
            }
        }

        async function panggilBerikutnya() {
            if (isLoading) return;
            isLoading = true;
            const btn = document.getElementById('btn-panggil');
            btn.innerHTML = '<span class="spinner"></span> Memanggil...';
            btn.disabled = true;

            try {
                const res = await fetch('/panggil-berikutnya', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast(`✅ Memanggil nomor antrian ${data.no_antrian} - ${data.nama}`);
                    loadData();
                } else {
                    showToast(data.message || 'Tidak ada antrian', true);
                }
            } catch (err) {
                showToast('Gagal memanggil antrian', true);
            }

            btn.innerHTML = '📢 Panggil Berikutnya';
            btn.disabled = false;
            isLoading = false;
        }

        async function selesaiWawancara() {
            if (isLoading) return;
            isLoading = true;

            try {
                const res = await fetch('/selesai-wawancara', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast('✅ Wawancara selesai!');
                    loadData();
                }
            } catch (err) {
                showToast('Gagal mengupdate status', true);
            }

            isLoading = false;
        }

        async function panggilUlang() {
            try {
                const res = await fetch('/panggil-ulang', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast(`🔄 Memanggil ulang nomor ${data.no_antrian} - ${data.nama}`);
                } else {
                    showToast(data.message || 'Gagal panggil ulang', true);
                }
            } catch (err) {
                showToast('Gagal panggil ulang', true);
            }
        }

        // Auto-refresh every 3 seconds
        setInterval(loadData, 3000);
        loadData();
    </script>

</body>

</html>
